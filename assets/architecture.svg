<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">AI Exoplanet Transit Detection Pipeline Architecture</title>
  <desc id="desc">A data flow diagram showing Kepler light curves moving through preprocessing, denoising autoencoder, CNN classifier, and prediction output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="52%" stop-color="#10233d"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <circle cx="102" cy="86" r="2" fill="#e0f2fe" opacity="0.85"/>
  <circle cx="188" cy="134" r="1.6" fill="#bfdbfe" opacity="0.75"/>
  <circle cx="995" cy="88" r="2" fill="#e0f2fe" opacity="0.75"/>
  <circle cx="1085" cy="160" r="1.8" fill="#bfdbfe" opacity="0.7"/>
  <circle cx="922" cy="430" r="1.8" fill="#e0f2fe" opacity="0.8"/>
  <circle cx="276" cy="420" r="1.4" fill="#bfdbfe" opacity="0.65"/>
  <text x="600" y="62" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#f8fafc">AI Exoplanet Transit Detection Pipeline</text>
  <text x="600" y="94" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#cbd5e1">From noisy Kepler light curves to planet-candidate predictions</text>

  <g filter="url(#shadow)">
    <rect x="56" y="182" width="190" height="138" rx="18" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.45"/>
    <text x="151" y="222" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">NASA Kepler</text>
    <text x="151" y="248" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#cbd5e1">KOI / MAST data</text>
    <path d="M91 286 C110 260, 131 312, 153 286 S196 286, 216 268" fill="none" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="316" y="182" width="190" height="138" rx="18" fill="url(#card)" stroke="#60a5fa" stroke-opacity="0.45"/>
    <text x="411" y="222" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">Preprocess</text>
    <text x="411" y="248" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#cbd5e1">clean, normalize,</text>
    <text x="411" y="270" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#cbd5e1">resample</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="576" y="182" width="190" height="138" rx="18" fill="url(#card)" stroke="#818cf8" stroke-opacity="0.5"/>
    <text x="671" y="218" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">Denoising</text>
    <text x="671" y="242" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">Autoencoder</text>
    <text x="671" y="272" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#cbd5e1">remove noise</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="836" y="182" width="190" height="138" rx="18" fill="url(#card)" stroke="#a78bfa" stroke-opacity="0.5"/>
    <text x="931" y="222" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">1D CNN</text>
    <text x="931" y="248" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#cbd5e1">classify transit</text>
    <text x="931" y="270" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#cbd5e1">patterns</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="438" y="370" width="324" height="84" rx="18" fill="#082f49" stroke="#22d3ee" stroke-opacity="0.45"/>
    <text x="600" y="407" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">Prediction Output</text>
    <text x="600" y="433" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#cbd5e1">confirmed exoplanet candidate or false positive</text>
  </g>

  <line x1="246" y1="251" x2="304" y2="251" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="506" y1="251" x2="564" y2="251" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="766" y1="251" x2="824" y2="251" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M931 320 C931 370, 762 354, 732 390" fill="none" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
